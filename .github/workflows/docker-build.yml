name: Build and Push EasyTier Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest EasyTier version
        id: get_version
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/EasyTier/EasyTier/tags?per_page=1" | grep -m 1 '"name":' | sed -E 's/.*"name": *"([^"]+)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download and prepare binaries
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p dist/amd64 dist/arm64 dist/armv7
          
          # amd64 (x86_64)
          curl -L "https://github.com/EasyTier/EasyTier/releases/download/${VERSION}/easytier-linux-x86_64-${VERSION}.zip" -o amd64.zip
          unzip amd64.zip -d dist/amd64_tmp
          mv dist/amd64_tmp/easytier-linux-x86_64/* dist/amd64/
          
          # arm64 (aarch64)
          curl -L "https://github.com/EasyTier/EasyTier/releases/download/${VERSION}/easytier-linux-aarch64-${VERSION}.zip" -o arm64.zip
          unzip arm64.zip -d dist/arm64_tmp
          mv dist/arm64_tmp/easytier-linux-aarch64/* dist/arm64/
          
          # armv7
          curl -L "https://github.com/EasyTier/EasyTier/releases/download/${VERSION}/easytier-linux-armv7-${VERSION}.zip" -o armv7.zip
          unzip armv7.zip -d dist/armv7_tmp
          mv dist/armv7_tmp/easytier-linux-armv7/* dist/armv7/
          
          rm -rf *.zip dist/*_tmp

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
