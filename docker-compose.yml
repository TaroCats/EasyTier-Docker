services:
  easytier:
    image: ghcr.io/tarocats/easytier-docker:latest
    container_name: easytier
    restart: always
    privileged: true # Required for creating TUN device
    network_mode: host # Host mode is recommended for EasyTier to handle P2P and TUN properly
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./easytier:/opt/easytier
    environment:
      - TZ=Asia/Shanghai
      - ET_WEB=${ET_WEB:-} # Optional: Web Embed URL
      - GH_TOKEN=${GH_TOKEN:-} # Optional: Your GitHub Personal Access Token
      - ET_HOSTNAME=${ET_HOSTNAME:-} # Optional: Hostname for EasyTier